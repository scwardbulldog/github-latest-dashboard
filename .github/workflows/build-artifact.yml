name: Rebuild generated artifacts

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'vite.config.js'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build artifact
        run: npm run build

      - name: Commit rebuilt artifacts if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- index.html img/; then
            git add index.html img/
            git commit -m "chore: rebuild generated artifacts [skip ci]"
            git push
          fi
