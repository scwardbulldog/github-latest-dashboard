name: Rebuild generated artifacts

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'vite.config.js'
      - 'package.json'
      - 'package-lock.json'

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build artifact
        run: npm run build

      - name: Create PR for rebuilt artifacts if changed
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: rebuild generated artifacts [skip ci]"
          branch: chore/rebuild-artifacts
          title: "chore: rebuild generated artifacts"
          body: "Automated rebuild of generated artifacts triggered by source changes."
          add-paths: |
            index.html
            img/
