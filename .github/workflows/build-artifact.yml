name: Rebuild generated artifacts

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'vite.config.js'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: build-artifact
  cancel-in-progress: true

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build artifact
        run: npm run build

      - name: Commit and push rebuilt artifacts if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html img/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No artifact changes to commit"
          else
            git commit -m "chore: rebuild generated artifacts [skip ci]"
            git pull --rebase origin main
            git push --force-with-lease
          fi
