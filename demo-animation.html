<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Octocat Skating Animation Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 32px;
        }
        h1 {
            font-size: 2rem;
            color: #58a6ff;
        }
        .subtitle {
            color: #8b949e;
            font-size: 1rem;
        }
        .animation-container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .progress-track {
            width: 600px;
            height: 6px;
            background: #21262d;
            border-radius: 3px;
            position: relative;
            overflow: visible;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1f6feb, #58a6ff);
            border-radius: 3px;
            transition: none;
        }
        .octocat-on-track {
            position: absolute;
            bottom: 0;
            left: 0;
            transform: translateX(-50%);
        }
        .octocat-on-track canvas {
            display: block;
        }
        .info {
            color: #8b949e;
            font-size: 0.875rem;
            text-align: center;
        }
        .badge {
            background: #1f6feb;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    class FrameSequenceAnimator {
        constructor(config) {
            this.canvas = config.canvas;
            this.ctx = this.canvas.getContext('2d');
            this.framePaths = config.framePaths || [];
            this.fps = config.fps || 6;
            this.scale = config.scale || 1;
            this.frames = [];
            this.currentFrame = 0;
            this.isPlaying = false;
            this.lastFrameTime = 0;
            this.animationId = null;
            this.onLoad = config.onLoad || null;
            this.loadFrames();
        }

        loadFrames() {
            let loadedCount = 0;
            this.frames = new Array(this.framePaths.length);
            this.framePaths.forEach((path, index) => {
                const img = new Image();
                img.onload = () => {
                    this.frames[index] = img;
                    loadedCount++;
                    if (loadedCount === this.framePaths.length) {
                        this.resizeCanvas();
                        this.draw();
                        if (this.onLoad) this.onLoad(this);
                    }
                };
                img.src = path;
            });
        }

        resizeCanvas() {
            const f = this.frames[0];
            this.canvas.width = f.width * this.scale;
            this.canvas.height = f.height * this.scale;
            this.ctx.imageSmoothingEnabled = false;
        }

        draw() {
            this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
            const frame = this.frames[this.currentFrame];
            if (!frame) return;
            this.ctx.drawImage(frame, 0, 0, this.canvas.width, this.canvas.height);
        }

        animate(timestamp) {
            if (!this.isPlaying) return;
            const frameInterval = 1000 / this.fps;
            const elapsed = timestamp - this.lastFrameTime;
            if (elapsed >= frameInterval) {
                this.currentFrame = (this.currentFrame + 1) % this.frames.length;
                this.draw();
                this.lastFrameTime = timestamp - (elapsed % frameInterval);
            }
            this.animationId = requestAnimationFrame((ts) => this.animate(ts));
        }

        play() {
            if (this.isPlaying) return;
            this.isPlaying = true;
            this.lastFrameTime = performance.now();
            this.animationId = requestAnimationFrame((ts) => this.animate(ts));
        }
    }

    // Large showcase animation (centered)
    const bigAnimator = new FrameSequenceAnimator({
        canvas: document.getElementById('spriteCanvas'),
        framePaths,
        fps: 6,
        scale: 0.8,
        onLoad: (a) => a.play()
    });

    // Small tracker on progress bar
    const trackCanvas = document.getElementById('trackCanvas');
    const trackAnimator = new FrameSequenceAnimator({
        canvas: trackCanvas,
        framePaths,
        fps: 6,
        scale: 0.18,
        onLoad: (a) => a.play()
    });

    // Animate progress bar cycling
    const progressFill = document.getElementById('progressFill');
    const octocatOnTrack = document.querySelector('.octocat-on-track');
    let progress = 0;
    const CYCLE_DURATION = 8000; // 8 seconds per demo cycle
    let startTime = null;

    function animateProgress(timestamp) {
        if (!startTime) startTime = timestamp;
        const elapsed = (timestamp - startTime) % CYCLE_DURATION;
        progress = (elapsed / CYCLE_DURATION) * 100;
        progressFill.style.width = progress + '%';
        octocatOnTrack.style.left = progress + '%';
        requestAnimationFrame(animateProgress);
    }
    requestAnimationFrame(animateProgress);
